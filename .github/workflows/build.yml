name: Build Android TWA
on:
  push:
    branches: [ main ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "build-tools;34.0.0"
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          echo "KEYSTORE_PATH=$PWD/keystore.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease bundleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: bullion-dealer-pro-release-apk
          path: build/outputs/apk/release/bullion-dealer-pro-android-release-unsigned.apk
      - uses: actions/upload-artifact@v4
        with:
          name: bullion-dealer-pro-release-aab
          path: build/outputs/bundle/release/bullion-dealer-pro-android-release.aab