name: Build Android TWA
on:
  push:
    branches: [ main ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "build-tools;34.0.0"
      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease bundleRelease --no-daemon
      - name: Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/34.0.0
          APK=build/outputs/apk/release/bullion-dealer-pro-android-release-unsigned.apk
          $BUILD_TOOLS/zipalign -v -p 4 "$APK" aligned.apk
          $BUILD_TOOLS/apksigner sign --ks keystore.jks --ks-key-alias "bulliondealerpro" --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --key-pass pass:${{ secrets.KEY_PASSWORD }} --out bullion-dealer-pro-release.apk aligned.apk
      - uses: actions/upload-artifact@v4
        with:
          name: bullion-dealer-pro-release-apk
          path: bullion-dealer-pro-release.apk
      - uses: actions/upload-artifact@v4
        with:
          name: bullion-dealer-pro-release-aab
          path: build/outputs/bundle/release/bullion-dealer-pro-android-release.aab